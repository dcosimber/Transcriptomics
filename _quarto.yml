    pinned: true
  search:
    location: navbar
    type: overlay
  author:
    - name: Daniel Costas
      orcid: 0000-0003-4384-8469
      email: dcostas@iim.csic.es
      affiliations:
        - name: Instituto de Investigaciones Marinas (IIM-CSIC)
          city: Vigo
          state: Spain
          url: www.iim.csic.es
        - name: Aquabiotec Lab
          city: Vigo
          state: Spain
          url: https://acuabiotec.csic.es

  date: last-modified
